<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Admin Express</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main class="login-layout">
        <section class="login-brand">
            <h1 class="brand-title">AdminExpress</h1>
        </section>
        <section class="login-panel">
            <h2 class="login-heading">Let's <span class="bold-text">Sign In</span></h2>
            <p class="login-lead">Hey. Enter your details to get sign in to your account.</p>

            <form class="login-form">
                <h3 class="field-label">Email</h3>
                <input class="login-input" type="email" placeholder="Enter Email" />
                <h3 class="field-label">Password</h3>
                <input class="login-input" type="password" placeholder="Enter Password" />
                <a class="login-link" href="#">Forgot password?</a>
                <button class="login-submit" type="submit">Sign In</button>
            </form>
        </section>
    </main>

</body>

</html>
